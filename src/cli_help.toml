[root]
about = "AI-assisted Git commit messages"

[root.args.provider]
help = "Override the configured AI provider for this run"

[root.args.full_gitmoji_spec]
help = "Use the full GitMoji prompt"

[root.args.context]
help = "Additional commit context"

[root.args.yes]
help = "Skip commit prompts and auto-stage/auto-push when unambiguous"

[root.args.dry_run]
help = "Generate and print the message without committing"

[root.args.amend]
help = "Regenerate and amend the last commit message"

[root.args.git_args]
help = "Arguments passed through to git commit"
long_help = """
Arguments passed through to git commit in the default commit flow, such as
--no-verify or a commit-message template containing $msg.
"""

[root.commands.config]
about = "Read and update global aic configuration"
long_about = """
Read and update global aic configuration stored in ~/.aicommit.

Examples:
  aic config set AIC_MODEL=gpt-5.4-mini
  aic config get AIC_MODEL AIC_AI_PROVIDER
  aic config describe
"""

[root.commands.config.commands.set]
about = "Set one or more global config values"

[root.commands.config.commands.set.args.key_values]
help = "Config assignments in KEY=value form"

[root.commands.config.commands.get]
about = "Print one or more resolved config values"

[root.commands.config.commands.get.args.keys]
help = "Config keys to read"

[root.commands.config.commands.describe]
about = "Explain supported config keys"

[root.commands.config.commands.describe.args.keys]
help = "Config keys to describe; omit to describe all supported keys"

[root.commands.setup]
about = "Run interactive provider and model setup"

[root.commands.models]
about = "List available models for the configured provider"

[root.commands.models.args.refresh]
help = "Refresh the cached remote model list"

[root.commands.hook]
about = "Manage the Git commit-msg hook"
long_about = """
Install or remove the aic commit-msg hook for the current repository.

Examples:
  aic hook set
  aic hook unset
"""

[root.commands.hook.commands.set]
about = "Install the commit-msg hook in the current repository"

[root.commands.hook.commands.unset]
about = "Remove the aic-managed commit-msg hook"

[root.commands.hook.commands.hookrun.args.message_file]
help = "Path to the commit message file provided by Git"

[root.commands.hook.commands.hookrun.args.commit_source]
help = "Optional Git commit source passed to the hook"

[root.commands.completions]
about = "Generate shell completions"

[root.commands.completions.args.shell]
help = "Shell to generate completions for"

[root.commands.review]
about = "Review staged changes for bugs, security, and style issues"
long_about = """
Review staged changes for bugs, security, and style issues.

Only the staged diff (git diff --staged) is reviewed. Unstaged changes are ignored.
In an interactive terminal, if nothing is staged, aic offers the staging menu first.

Examples:
  aic review
  aic review -c 'focus on security'
  aic review --context 'this is a database migration'
"""

[root.commands.review.args.context]
help = "Focus the review on a specific concern (for example, 'focus on security')"

[root.commands.pr]
about = "Generate a pull request title and description"
long_about = """
Generate a pull request title and Markdown description from the branch commits
and cumulative diff against a base branch.

Examples:
  aic pr
  aic pr --base origin/main
  aic pr -c 'highlight migration risk'
  aic pr --yes
"""

[root.commands.pr.args.context]
help = "Additional pull request context to include in the prompt"

[root.commands.pr.args.base]
help = "Base branch or ref to diff against"

[root.commands.pr.args.yes]
help = "Skip confirmation and print the final PR text"

[root.commands.history]
about = "Show recent AI-generated commit messages, PR drafts, and reviews"

[root.commands.history.args.count]
help = "Number of entries to show"

[root.commands.history.args.kind]
help = "Filter by kind: commit, pr, or review"

[root.commands.history.args.all]
help = "Include temp and test history entries"

[root.commands.history.args.verbose]
help = "Show full message bodies and full repo paths"

[root.commands.history.args.interactive]
help = "Force interactive history browsing"

[root.commands.history.args.non_interactive]
help = "Print history as plain text instead of launching the picker"

[root.commands.log]
about = "Rewrite recent commit messages using AI"
long_about = """
Rewrite recent commit messages using AI.

Generates new commit messages for the last N commits on the current branch using
the same AI provider as normal commits. Shows a before/after comparison and
rewrites via git rebase on confirmation.

Requires a clean working tree and no merge commits in the range.

Examples:
  aic log
  aic log -n 3
  aic log -n 5 --yes
"""

[root.commands.log.args.count]
help = "Number of commits to rewrite"

[root.commands.log.args.yes]
help = "Skip confirmation"

[root.commands.map]
about = "Generate SVG visualizations of the codebase and commit history"
long_about = """
Generate SVG visualizations of the codebase and commit history.

Subcommands:
  tree      Treemap of the file hierarchy sized by line count
  history   Horizontal timeline of recent commits
  heat      Heatmap of file modification frequency
  activity  GitHub-style contribution grid from commit timestamps

Examples:
  aic map tree
  aic map history -n 30
  aic map heat -n 100 -o heatmap.svg
  aic map activity
"""

[root.commands.map.commands.tree]
about = "Generate a treemap of the codebase file hierarchy"

[root.commands.map.commands.tree.args.output]
help = "Output file path (default: aic-treemap.svg)"

[root.commands.map.commands.tree.args.no_ai]
help = "Skip AI-powered cluster annotation (reserved for future use)"

[root.commands.map.commands.tree.args.theme]
help = "Color theme: github-light (default), github-dark, classic-light, classic-dark, solarized-light, solarized-dark, monokai, or dracula"

[root.commands.map.commands.history]
about = "Generate a commit timeline visualization"

[root.commands.map.commands.history.args.output]
help = "Output file path (default: aic-timeline.svg)"

[root.commands.map.commands.history.args.commits]
help = "Number of recent commits to include"

[root.commands.map.commands.history.args.theme]
help = "Color theme: github-light (default), github-dark, classic-light, classic-dark, solarized-light, solarized-dark, monokai, or dracula"

[root.commands.map.commands.heat]
about = "Generate a file modification heatmap"

[root.commands.map.commands.heat.args.output]
help = "Output file path (default: aic-heatmap.svg)"

[root.commands.map.commands.heat.args.commits]
help = "Number of recent commits to analyze"

[root.commands.map.commands.heat.args.theme]
help = "Color theme: github-light (default), github-dark, classic-light, classic-dark, solarized-light, solarized-dark, monokai, or dracula"

[root.commands.map.commands.activity]
about = "Generate a GitHub-style activity contribution grid"

[root.commands.map.commands.activity.args.output]
help = "Output file path (default: aic-activity.svg)"

[root.commands.map.commands.activity.args.commits]
help = "Number of recent commits to include"

[root.commands.map.commands.activity.args.theme]
help = "Color theme: github-light (default), github-dark, classic-light, classic-dark, solarized-light, solarized-dark, monokai, or dracula"

[config_keys]
AIC_AI_PROVIDER = "AI provider to use for commit generation: openai, azure-openai, anthropic, groq, ollama, claude-code, codex, or copilot"
AIC_API_KEY = "API key for the selected provider"
AIC_API_URL = "Custom provider API URL; required for Azure OpenAI"
AIC_API_CUSTOM_HEADERS = "JSON object of custom HTTP headers"
AIC_PROXY = "HTTP or HTTPS proxy URL"
AIC_TOKENS_MAX_INPUT = "Maximum input token budget"
AIC_TOKENS_MAX_OUTPUT = "Maximum generated output tokens"
AIC_DESCRIPTION = "Include a short body after the subject"
AIC_EMOJI = "Prefix generated messages with GitMoji"
AIC_MODEL = "AI model to use"
AIC_LANGUAGE = "Language for generated commit messages"
AIC_MESSAGE_TEMPLATE_PLACEHOLDER = "Placeholder used in message templates"
AIC_PROMPT_FILE = "Path to a custom system prompt template"
AIC_ONE_LINE_COMMIT = "Generate a single-line message"
AIC_OMIT_SCOPE = "Avoid conventional commit scopes"
AIC_GITPUSH = "Enable push-after-commit flow"
AIC_REMOTE_ICON_STYLE = "Remote host icon style for push prompts: auto, nerd-font, emoji, or label"
AIC_HOOK_AUTO_UNCOMMENT = "Write hook-generated messages uncommented"
