name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - 'AGENTS.md'
      - 'README.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'AGENTS.md'
      - 'README.md'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Check compilation
        run: cargo check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

  build:
    name: Build (${{ matrix.artifact }})
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: aic-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: aic-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: aic-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: aic-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: aic-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/aic ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/aic.exe ${{ matrix.artifact }}

      - name: Generate checksum (Unix)
        if: matrix.os != 'windows-latest'
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Generate checksum (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 ${{ matrix.artifact }}).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -Encoding ascii ${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v6
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true

  update-tap:
    name: Update Homebrew Tap
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Set release version
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "Using version: ${GITHUB_REF_NAME}"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Read macOS checksums
        id: checksums
        run: |
          AMD64_SHA_FILE=$(find artifacts -name 'aic-darwin-amd64.sha256' -print -quit)
          ARM64_SHA_FILE=$(find artifacts -name 'aic-darwin-arm64.sha256' -print -quit)

          if [ -z "${AMD64_SHA_FILE}" ] || [ -z "${ARM64_SHA_FILE}" ]; then
            echo "Unable to locate macOS checksum files in downloaded artifacts" >&2
            exit 1
          fi

          AMD64_SHA=$(cut -d' ' -f1 "${AMD64_SHA_FILE}")
          ARM64_SHA=$(cut -d' ' -f1 "${ARM64_SHA_FILE}")

          echo "amd64_sha=${AMD64_SHA}" >> "$GITHUB_OUTPUT"
          echo "arm64_sha=${ARM64_SHA}" >> "$GITHUB_OUTPUT"
          echo "Loaded checksum files from workflow artifacts"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula file
        run: |
          VERSION=${{ steps.version.outputs.version }}
          AMD64_SHA=${{ steps.checksums.outputs.amd64_sha }}
          ARM64_SHA=${{ steps.checksums.outputs.arm64_sha }}

          cd homebrew-tap
          mkdir -p Formula

          cat > Formula/aicommit.rb << EOF
          class Aicommit < Formula
            desc "AI-assisted Git commit messages"
            homepage "https://github.com/${{ github.repository }}"
            version "${VERSION#v}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${{ github.repository }}/releases/download/${VERSION}/aic-darwin-arm64"
                sha256 "${ARM64_SHA}"
              else
                url "https://github.com/${{ github.repository }}/releases/download/${VERSION}/aic-darwin-amd64"
                sha256 "${AMD64_SHA}"
              end
            end

            def install
              if Hardware::CPU.arm?
                bin.install "aic-darwin-arm64" => "aic"
              else
                bin.install "aic-darwin-amd64" => "aic"
              end
            end

            test do
              system "#{bin}/aic", "--version"
            end
          end
          EOF

      - name: Commit and push tap update
        run: |
          VERSION=${{ steps.version.outputs.version }}

          cd homebrew-tap
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add Formula/aicommit.rb

          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi

          git commit -m "Update aicommit to ${VERSION}"
          git push
