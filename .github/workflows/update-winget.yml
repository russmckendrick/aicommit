name: Manual WinGet Update

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to submit. Defaults to the latest GitHub release.
        required: false
        type: string

permissions:
  contents: read

env:
  INSTALLER_NAME: aic-windows-amd64.exe
  PACKAGE_IDENTIFIER: RussMckendrick.Aicommit
  PACKAGE_MANIFEST_PATH: manifests/r/RussMckendrick/Aicommit

jobs:
  update-winget:
    name: Update WinGet package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install .NET runtime
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 6.0.x

      - name: Submit WinGet package update
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
        run: .\.github\scripts\update-winget.ps1
